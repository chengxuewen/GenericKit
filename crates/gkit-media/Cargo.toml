[package]
name = "gkit-media"
version.workspace = true
edition.workspace = true

[features]
default = ["backend-native"]
backend-native = []
backend-native-webrtc-rs = ["backend-native", "dep:webrtc", "dep:tokio", "dep:bytes", "dep:openh264"]
backend-native-google = ["backend-native"]

[dependencies]
gkit-core.workspace = true
webrtc = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
openh264 = { workspace = true, optional = true }

[build-dependencies]
ureq = { version = "2", features = ["tls"] }
zip = "0.6"

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.build-dependencies]
cc = "1.0"

[target.'cfg(target_os = "linux")'.build-dependencies]
cc = "1.0"
pkg-config = "0.3"

[lib]
crate-type = ["lib", "staticlib", "cdylib"]

[dev-dependencies]
eframe = "0.30"
egui = "0.30"
image = { version = "0.25", default-features = false, features = ["bmp"] }
webrtc = "0.17"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
bytes = "1"