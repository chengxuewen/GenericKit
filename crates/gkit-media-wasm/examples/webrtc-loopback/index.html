<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GkitMedia WebRTC P2P Loopback</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1380px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #0f3460;
        }

        .panel h2 {
            font-size: 1rem;
            font-weight: 500;
            color: #a0a0b0;
            margin-bottom: 10px;
            text-align: center;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 6px;
            background: #0a0a1a;
            border: 1px solid #0f3460;
        }

        .stats {
            text-align: center;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #788;
        }

        .stats span {
            color: #e94560;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #start-btn {
            background: #e94560;
            color: #fff;
        }
        #start-btn:hover:not(:disabled) {
            background: #d63850;
        }

        #stop-btn {
            background: #333;
            color: #ccc;
        }
        #stop-btn:hover:not(:disabled) {
            background: #444;
        }

        #status {
            font-size: 0.9rem;
            padding: 6px 16px;
            border-radius: 6px;
            background: #16213e;
            min-width: 200px;
            text-align: center;
        }

        #status.ok { color: #4caf50; }
        #status.warn { color: #ff9800; }
        #status.error { color: #f44336; }

        .info {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: #788;
            text-align: center;
        }

        .info span {
            color: #e94560;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .info .label {
            display: inline-block;
            min-width: 48px;
            color: #a0a0b0;
        }

        .stats-panel {
            text-align: center;
            margin-top: 8px;
            font-size: 0.82rem;
            color: #788;
        }

        .sdp-log {
            text-align: center;
            margin-top: 8px;
            font-size: 0.78rem;
            color: #666;
        }

        .sdp-log pre {
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }

        .version {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GkitMedia WebRTC P2P Loopback</h1>
        <div class="grid">
            <div class="panel">
                <h2>Receiver (Decoded Frames)</h2>
                <canvas id="recv-canvas" width="640" height="360"></canvas>
                <div class="stats">Received: <span id="recv-count">0</span></div>
            </div>
            <div class="panel">
                <h2>Sender (Generated Frames)</h2>
                <canvas id="send-canvas" width="640" height="360"></canvas>
                <div class="stats">Sent: <span id="sent-count">0</span></div>
            </div>
        </div>
        <div class="controls">
            <button id="start-btn">Start</button>
            <button id="stop-btn" disabled>Stop</button>
            <span id="status">Loading WASM module...</span>
        </div>
        <div class="info">
            <span><span class="label">ICE1:</span> <span id="ice1">&mdash;</span></span>
            <span><span class="label">ICE2:</span> <span id="ice2">&mdash;</span></span>
            <span><span class="label">Signal1:</span> <span id="sig1">&mdash;</span></span>
            <span><span class="label">Signal2:</span> <span id="sig2">&mdash;</span></span>
        </div>
        <div class="stats-panel">
            <div class="label">Stats:</div>
            <span id="stats-text">—</span>
        </div>
        <details class="sdp-log">
            <summary>SDP Negotiation</summary>
            <pre id="sdp-text"></pre>
        </details>
        <div class="version" id="version"></div>
    </div>

    <script type="module">
        import init, {
            RtcPeerConnection,
            RtcConfiguration,
            IceServer,
            RtcVideoSource,
            RtcVideoSink,
            get_version,
        } from './gkit_media_wasm.js';

        // ── DOM refs ──────────────────────────────────────────────────────
        const $ = (id) => document.getElementById(id);
        const sendCanvas = $('send-canvas');
        const recvCanvas = $('recv-canvas');
        const sendCtx = sendCanvas.getContext('2d');
        const recvCtx = recvCanvas.getContext('2d');
        const sentCount = $('sent-count');
        const recvCount = $('recv-count');
        const startBtn = $('start-btn');
        const stopBtn = $('stop-btn');
        const statusEl = $('status');
        const ice1El = $('ice1');
        const ice2El = $('ice2');
        const sig1El = $('sig1');
        const sig2El = $('sig2');
        const versionEl = $('version');
        const statsText = $('stats-text');
        const sdpText = $('sdp-text');

        let sentFrames = 0;
        let receivedFrames = 0;
        let source = null;
        let senderTrack = null;
        let pc1 = null;
        let pc2 = null;
        let iceTimer = null;
        let stopped = false;
        let remoteVideo = null;
        let statsTimer = null;
        let statsDiffTimer = null;

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls || '';
        }

        // ── Initialization ──────────────────────────────────────────────

        async function main() {
            await init();

            try {
                versionEl.textContent = 'GkitMedia v' + get_version();
            } catch (_) {
                versionEl.textContent = '';
            }

            setStatus('Ready', 'ok');
            startBtn.disabled = false;

            const autoStart = window.location.search.includes('auto');
            if (autoStart) {
                await start();
            }

            startBtn.onclick = start;
            stopBtn.onclick = stop;
        }

        // ── Start P2P Loopback ──────────────────────────────────────────

        async function start() {
            try {
                stopped = false;
                sentFrames = 0;
                receivedFrames = 0;
                senderTrack = null;
                sentCount.textContent = '0';
                recvCount.textContent = '0';
                const startTime = Date.now();

                // Clear canvases
                sendCtx.fillStyle = '#0a0a1a';
                sendCtx.fillRect(0, 0, 640, 360);
                recvCtx.fillStyle = '#0a0a1a';
                recvCtx.fillRect(0, 0, 640, 360);

                startBtn.disabled = true;

                // Pre-create receiver video while user gesture is active (autoplay policy)
                // Will set srcObject when remote track arrives
                remoteVideo = remoteVideo || document.createElement('video');
                remoteVideo.autoplay = true;
                remoteVideo.muted = true;
                remoteVideo.playsInline = true;
                remoteVideo.style.cssText = 'position:fixed;bottom:10px;right:10px;width:160px;height:90px;z-index:9999;border:2px solid red;background:#000';
                if (!remoteVideo.parentNode) document.body.appendChild(remoteVideo);
                remoteVideo.setAttribute('title', 'Remote Video (debug visible)');
                remoteVideo.play().catch(e => console.error('[JS] pre-play failed:', e));

                setStatus('Creating video source...', 'warn');

                // Create video source (640x360, 15fps)
                source = new RtcVideoSource(640, 360, 15);

                // Sender visualization: add a sink to the source for local display
                source.add_sink((rgba, w, h) => {
                    sentFrames++;
                    sentCount.textContent = sentFrames;
                    const clamped = new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength);
                    const imgData = new ImageData(clamped, w, h);
                    sendCtx.putImageData(imgData, 0, 0);
                    if (sentFrames <= 5 || sentFrames % 30 === 0) {
                        console.log(`[JS TX] frame #${sentFrames} shown on sender canvas`);
                    }
                    if (sentFrames === 1) {
                        // Also show first frame on receiver canvas for visual confirmation
                        recvCtx.putImageData(imgData, 0, 0);
                        recvCount.textContent = '1 (pipeline test)';
                    }
                });
                source.start();
                
                // Create peer connections (loopback: no STUN needed)
                const config1 = new RtcConfiguration();
                const config2 = new RtcConfiguration();
                pc1 = new RtcPeerConnection(config1);
                pc2 = new RtcPeerConnection(config2);
                window.pc1 = pc1;
                window.pc2 = pc2;

                // ICE candidate exchange — queue candidates and replay after setRemoteDescription
                // because Chrome requires remote description to be set before addIceCandidate
                const pc1Candidates = [];
                const pc2Candidates = [];
                pc1.set_on_ice_candidate((candidate) => {
                    if (candidate && candidate.candidate) {
                        pc1Candidates.push(candidate);
                    }
                });
                pc2.set_on_ice_candidate((candidate) => {
                    if (candidate && candidate.candidate) {
                        pc2Candidates.push(candidate);
                    }
                });

                // Helper to replay queued candidates to the other peer
                const replayCandidates = (candidates, targetPc) => {
                    for (const c of candidates) {
                        try {
                            targetPc.add_ice_candidate(c.candidate, c.sdp_mid || '');
                        } catch (e) {
                            console.warn('Failed to replay candidate:', e);
                        }
                    }
                    candidates.length = 0; // clear queue
                };

                // ICE state monitoring (with timestamps) + signal state
                pc1.set_on_ice_connection_state_change((state) => {
                    ice1El.textContent = `${state} (${((Date.now()-startTime)/1000).toFixed(1)}s)`;
                    sig1El.textContent = `${state} (${((Date.now()-startTime)/1000).toFixed(1)}s)`;
                });
                pc2.set_on_ice_connection_state_change((state) => {
                    ice2El.textContent = `${state} (${((Date.now()-startTime)/1000).toFixed(1)}s)`;
                    sig2El.textContent = `${state} (${((Date.now()-startTime)/1000).toFixed(1)}s)`;
                });

                // Create video track from source on offerer (pc1)
                senderTrack = pc1.create_video_track(source);
                // Stats polling for sender diagnostics
                let statsInterval = setInterval(() => {
                    try {
                        const statsJson = pc1.get_stats_json();
                        const hasVideo = statsJson.includes('outbound-rtp') || statsJson.includes('video');
                        console.log('[SND stats] hasOutboundVideo=' + hasVideo + ' len=' + statsJson.length);
                    } catch(e) { console.log('[SND stats] err:', e.message); }
                }, 3000);

                // Receiver: JS-side video playback (more reliable than Rust add_sink)
                pc2.set_on_track((track) => {
                    console.log('[JS] remote track received');
                    const rawTrack = track.raw_track();
                    const stream = new MediaStream([rawTrack]);
                    remoteVideo.srcObject = stream;
                    console.log('[JS DIAG] video.readyState=' + remoteVideo.readyState + ' networkState=' + remoteVideo.networkState + ' paused=' + remoteVideo.paused);
                    if (remoteVideo.error) console.error('[JS DIAG] video.error=' + remoteVideo.error.message);
                    const vt = stream.getVideoTracks();
                    if (vt.length > 0) console.log('[JS DIAG] track.readyState=' + vt[0].readyState + ' kind=' + vt[0].kind + ' enabled=' + vt[0].enabled);
                    console.log('[JS] srcObject set on pre-playing video');
                    
                    // Frame extraction: draw video → receiver canvas
                    function extractFrame() {
                        if (stopped) return;
                        if (remoteVideo.videoWidth === 0 || remoteVideo.videoHeight === 0) {
                            if (frameAttempts === undefined) window._frameAttempts = 0;
                            window._frameAttempts++;
                            if (window._frameAttempts <= 3 || window._frameAttempts % 30 === 0) {
                                console.log('[JS DIAG] extract attempt #' + window._frameAttempts + ': videoWidth=' + remoteVideo.videoWidth + ' readyState=' + remoteVideo.readyState + ' networkState=' + remoteVideo.networkState + ' paused=' + remoteVideo.paused + ' error=' + (remoteVideo.error ? remoteVideo.error.message : 'null'));
                            }
                            requestAnimationFrame(extractFrame);
                            return;
                        }
                        if (recvCanvas.width !== remoteVideo.videoWidth) {
                            recvCanvas.width = remoteVideo.videoWidth;
                            recvCanvas.height = remoteVideo.videoHeight;
                        }
                        recvCtx.drawImage(remoteVideo, 0, 0, recvCanvas.width, recvCanvas.height);
                        receivedFrames++;
                        recvCount.textContent = receivedFrames;
                        if (receivedFrames <= 5 || receivedFrames % 30 === 0) {
                            console.log(`[JS RX] frame #${receivedFrames} ${remoteVideo.videoWidth}x${remoteVideo.videoHeight}`);
                        }
                        requestAnimationFrame(extractFrame);
                    }
                    requestAnimationFrame(extractFrame);
                });

                // --- WebRTC P2P negotiation with spawn_local async
                
                // Step 1: pc1 creates offer
                pc1.create_offer();
                // Wait for spawn_local to complete ICE gathering
                await new Promise(r => setTimeout(r, 2000));
                // Poll until ICE gathering complete for offer
                for (let i = 0; i < 20; i++) {
                    if (pc1.gathering_state() === 'Complete') break;
                    await new Promise(r => setTimeout(r, 500));
                }
                setStatus('ICE gathering complete for offer ✅', 'ok');

                // Re-read offer with ICE candidates
                const offer = pc1.local_description();
                if (!offer || !offer.sdp) {
                    setStatus('Error: offer not ready', 'err');
                    return;
                }
                sig1El.textContent = 'offer sent';
                
                // Step 2: pc2 sets remote description
                pc2.set_remote_description(offer);
                await new Promise(r => setTimeout(r, 1000));
                // Replay pc1's ICE candidates to pc2 now that remote description is set
                replayCandidates(pc1Candidates, pc2);
                
                // Step 3: pc2 creates answer
                pc2.create_answer();
                await new Promise(r => setTimeout(r, 2000));
                // Poll until ICE gathering complete for answer
                for (let i = 0; i < 20; i++) {
                    if (pc2.gathering_state() === 'Complete') break;
                    await new Promise(r => setTimeout(r, 500));
                }

                // Step 4: read answer with ICE candidates
                const answer = pc2.local_description();
                if (!answer || !answer.sdp) {
                    setStatus('Error: answer not ready', 'err');
                    return;
                }
                sig2El.textContent = 'answer created';
                
                // Step 5: pc1 sets remote description
                pc1.set_remote_description(answer);
                // Wait for spawn_local to actually set the remote description
                let rdSet = false;
                for (let i = 0; i < 20; i++) {
                    try {
                        const rd = pc1.remote_description();
                        if (rd && rd.sdp) { rdSet = true; break; }
                    } catch (_) {}
                    await new Promise(r => setTimeout(r, 500));
                }
                if (!rdSet) {
                    setStatus('Error: remote description not set after 10s', 'err');
                    return;
                }
                // Replay pc2's ICE candidates to pc1 now that remote description is set
                replayCandidates(pc2Candidates, pc1);
                sig1El.textContent = 'offer sent + answer rcvd';

                // Build SDP summary
                const summarizeSdp = (sdp) => {
                    const iceCandidates = (sdp.match(/^a=candidate:/gm) || []).length;
                    const mVideoLine = sdp.split('\n').find(line => line.startsWith('m=video')) || '';
                    return { iceCandidates, mVideoLine };
                };
                const offerSummary = summarizeSdp(offer.sdp);
                const answerSummary = summarizeSdp(answer.sdp);
                sdpText.textContent =
                    `Offer: ${offerSummary.mVideoLine || 'video track'}, ${offerSummary.iceCandidates} ICE candidate${offerSummary.iceCandidates !== 1 ? 's' : ''}\n` +
                    `Answer: ${answerSummary.mVideoLine || 'video track'}, ${answerSummary.iceCandidates} ICE candidate${answerSummary.iceCandidates !== 1 ? 's' : ''}`;

                // Start stats polling
                const statsStartTime = Date.now();
                statsTimer = setInterval(() => {
                    try {
                        const jsonStr = pc2.get_stats_json();
                        if (!jsonStr) return;
                        const stats = JSON.parse(jsonStr);
                        const arr = Array.isArray(stats) ? stats : [stats];
                        const elapsed = (Date.now() - statsStartTime) / 1000;
                        let kbps = 0, jitter = '\u2014', rtt = '\u2014', packetsLost = 0, bytesReceived = 0;
                        for (const s of arr) {
                            if (s.type === 'inbound-rtp' && s.kind === 'video') {
                                if (s.jitter !== undefined) jitter = s.jitter.toFixed(3);
                                if (s.roundTripTime !== undefined) rtt = s.roundTripTime.toFixed(3);
                                bytesReceived = s.bytesReceived || 0;
                                packetsLost = s.packetsLost || 0;
                            }
                        }
                        kbps = elapsed > 0 ? (bytesReceived * 8 / 1000 / elapsed) : 0;
                        const fps = elapsed > 0 ? (receivedFrames / elapsed) : 0;
                        statsText.textContent =
                            `fps:${fps.toFixed(0)}  kbps:${kbps.toFixed(0)}  jitter:${jitter}  rtt:${rtt}s  lost:${packetsLost}`;
                    } catch (_) {
                        // ignore stats errors
                    }
                }, 2000);

                // Stats diff tracker — log sent vs received every 5s
                statsDiffTimer = setInterval(() => {
                    console.log(`[STATS] sent=${sentFrames} recv=${receivedFrames} diff=${sentFrames - receivedFrames}`);
                }, 5000);

                // ICE state polling — polls ice_connection_state() every 1s
                const updateIceState = () => {
                    const state1 = pc1.ice_connection_state();
                    const state2 = pc2.ice_connection_state();
                    const t1 = ((Date.now()-startTime)/1000).toFixed(1);
                    if (state1 && state1 !== ice1El.dataset.last) {
                        ice1El.textContent = `${state1} (${t1}s)`;
                        sig1El.textContent = `${state1} (${t1}s)`;
                        ice1El.dataset.last = state1;
                    }
                    if (state2 && state2 !== ice2El.dataset.last) {
                        ice2El.textContent = `${state2} (${t1}s)`;
                        sig2El.textContent = `${state2} (${t1}s)`;
                        ice2El.dataset.last = state2;
                    }
                };
                updateIceState(); // immediate first poll
                iceTimer = setInterval(updateIceState, 1000);

                setStatus('SDP + ICE exchanged \u2705', 'ok');
                stopBtn.disabled = false;

            } catch (e) {
                setStatus('Error: ' + e, 'error');
                console.error('Start error:', e);
                startBtn.disabled = false;
                await cleanup();
            }
        }

        // ── Stop / Cleanup ──────────────────────────────────────────────

        async function stop() {
            stopped = true;
            setStatus('Stopping...', 'warn');
            startBtn.disabled = true;
            stopBtn.disabled = true;

            if (iceTimer) {
                clearInterval(iceTimer);
                iceTimer = null;
            }
            if (statsTimer) {
                clearInterval(statsTimer);
                statsTimer = null;
            }
            if (statsDiffTimer) {
                clearInterval(statsDiffTimer);
                statsDiffTimer = null;
            }

            await cleanup();

            ice1El.textContent = '\u2014';
            ice2El.textContent = '\u2014';
            sig1El.textContent = '\u2014';
            sig2El.textContent = '\u2014';
            statsText.textContent = '\u2014';
            sdpText.textContent = '';

            setStatus('Stopped', 'ok');
            startBtn.disabled = false;
        }

        async function cleanup() {
            senderTrack = null;
            if (source) {
                try { source.stop(); } catch (_) {}
                source = null;
            }
            if (pc1) {
                try { pc1.close(); } catch (_) {}
                pc1 = null;
            }
            if (pc2) {
                try { pc2.close(); } catch (_) {}
                pc2 = null;
            }
            // Reset canvases to black
            sendCtx.fillStyle = '#0a0a1a';
            sendCtx.fillRect(0, 0, 640, 360);
            recvCtx.fillStyle = '#0a0a1a';
            recvCtx.fillRect(0, 0, 640, 360);
            // Reset frame counters
            sentFrames = 0;
            receivedFrames = 0;
            sentCount.textContent = '0';
            recvCount.textContent = '0';
        }

        // ── Bootstrap ───────────────────────────────────────────────────

        main().catch((e) => {
            console.error('Init error:', e);
            setStatus('Init error: ' + e, 'error');
            startBtn.disabled = true;
        });
    </script>
</body>
</html>
