<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GkitMedia WebRTC P2P Loopback</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1380px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #0f3460;
        }

        .panel h2 {
            font-size: 1rem;
            font-weight: 500;
            color: #a0a0b0;
            margin-bottom: 10px;
            text-align: center;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 6px;
            background: #0a0a1a;
            border: 1px solid #0f3460;
        }

        .stats {
            text-align: center;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #788;
        }

        .stats span {
            color: #e94560;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #start-btn {
            background: #e94560;
            color: #fff;
        }
        #start-btn:hover:not(:disabled) {
            background: #d63850;
        }

        #stop-btn {
            background: #333;
            color: #ccc;
        }
        #stop-btn:hover:not(:disabled) {
            background: #444;
        }

        #status {
            font-size: 0.9rem;
            padding: 6px 16px;
            border-radius: 6px;
            background: #16213e;
            min-width: 200px;
            text-align: center;
        }

        #status.ok { color: #4caf50; }
        #status.warn { color: #ff9800; }
        #status.error { color: #f44336; }

        .info {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: #788;
            text-align: center;
        }

        .info span {
            color: #e94560;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .info .label {
            display: inline-block;
            min-width: 48px;
            color: #a0a0b0;
        }

        .version {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GkitMedia WebRTC P2P Loopback</h1>
        <div class="grid">
            <div class="panel">
                <h2>Receiver (Decoded Frames)</h2>
                <canvas id="recv-canvas" width="640" height="480"></canvas>
                <div class="stats">Received: <span id="recv-count">0</span></div>
            </div>
            <div class="panel">
                <h2>Sender (Generated Frames)</h2>
                <canvas id="send-canvas" width="640" height="480"></canvas>
                <div class="stats">Sent: <span id="sent-count">0</span></div>
            </div>
        </div>
        <div class="controls">
            <button id="start-btn">Start</button>
            <button id="stop-btn" disabled>Stop</button>
            <span id="status">Loading WASM module...</span>
        </div>
        <div class="info">
            <span><span class="label">ICE1:</span> <span id="ice1">&mdash;</span></span>
            <span><span class="label">ICE2:</span> <span id="ice2">&mdash;</span></span>
            <span><span class="label">Signal1:</span> <span id="sig1">&mdash;</span></span>
            <span><span class="label">Signal2:</span> <span id="sig2">&mdash;</span></span>
        </div>
        <div class="version" id="version"></div>
    </div>

    <script type="module">
        import init, {
            RtcPeerConnection,
            RtcConfiguration,
            IceServer,
            RtcVideoSource,
            RtcVideoSink,
            get_version,
        } from './gkit_media_wasm.js';

        // ── DOM refs ──────────────────────────────────────────────────────
        const $ = (id) => document.getElementById(id);
        const sendCanvas = $('send-canvas');
        const recvCanvas = $('recv-canvas');
        const sendCtx = sendCanvas.getContext('2d');
        const recvCtx = recvCanvas.getContext('2d');
        const sentCount = $('sent-count');
        const recvCount = $('recv-count');
        const startBtn = $('start-btn');
        const stopBtn = $('stop-btn');
        const statusEl = $('status');
        const ice1El = $('ice1');
        const ice2El = $('ice2');
        const sig1El = $('sig1');
        const sig2El = $('sig2');
        const versionEl = $('version');

        let sentFrames = 0;
        let receivedFrames = 0;
        let source = null;
        let pc1 = null;
        let pc2 = null;
        let iceTimer = null;
        let stopped = false;

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls || '';
        }

        // ── Initialization ──────────────────────────────────────────────

        async function main() {
            await init();

            try {
                versionEl.textContent = 'GkitMedia v' + get_version();
            } catch (_) {
                versionEl.textContent = '';
            }

            setStatus('Ready', 'ok');
            startBtn.disabled = false;

            startBtn.onclick = start;
            stopBtn.onclick = stop;
        }

        // ── Start P2P Loopback ──────────────────────────────────────────

        async function start() {
            try {
                stopped = false;
                sentFrames = 0;
                receivedFrames = 0;
                sentCount.textContent = '0';
                recvCount.textContent = '0';

                // Clear canvases
                sendCtx.fillStyle = '#0a0a1a';
                sendCtx.fillRect(0, 0, 640, 480);
                recvCtx.fillStyle = '#0a0a1a';
                recvCtx.fillRect(0, 0, 640, 480);

                startBtn.disabled = true;
                setStatus('Creating video source...', 'warn');

                // Create video source (640x480, 15fps)
                source = new RtcVideoSource(640, 480, 15);

                // Sender visualization: add a sink to the source for local display
                source.add_sink((rgba, w, h) => {
                    sentFrames++;
                    sentCount.textContent = sentFrames;
                    const clamped = new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength);
                    const imgData = new ImageData(clamped, w, h);
                    sendCtx.putImageData(imgData, 0, 0);
                    if (sentFrames === 1) {
                        // Also show first frame on receiver canvas for visual confirmation
                        recvCtx.putImageData(imgData, 0, 0);
                        recvCount.textContent = '1 (pipeline test)';
                    }
                });
                source.start();
                
                // Create peer connections
                const config1 = new RtcConfiguration();
                config1.add_ice_server(new IceServer(['stun:stun.l.google.com:19302']));
                const config2 = new RtcConfiguration();
                config2.add_ice_server(new IceServer(['stun:stun.l.google.com:19302']));
                pc1 = new RtcPeerConnection(config1);
                pc2 = new RtcPeerConnection(config2);

                // Receiver: set up onTrack callback
                pc1.set_on_track((track) => {
                    const sink = new RtcVideoSink((rgba, w, h) => {
                        receivedFrames++;
                        recvCount.textContent = receivedFrames;
                        const clamped = new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength);
                        const imgData = new ImageData(clamped, w, h);
                        recvCtx.putImageData(imgData, 0, 0);
                    });
                    if (track && typeof track.add_sink === 'function') {
                        track.add_sink(sink);
                    }
                });

                // ICE candidate exchange
                pc1.set_on_ice_candidate((candidate) => {
                    if (candidate && candidate.candidate) {
                        pc2.add_ice_candidate(candidate.candidate, candidate.sdp_mid || '');
                    }
                });
                pc2.set_on_ice_candidate((candidate) => {
                    if (candidate && candidate.candidate) {
                        pc1.add_ice_candidate(candidate.candidate, candidate.sdp_mid || '');
                    }
                });

                // ICE state monitoring
                pc1.set_on_ice_connection_state_change((state) => {
                    ice1El.textContent = state;
                });
                pc2.set_on_ice_connection_state_change((state) => {
                    ice2El.textContent = state;
                });

                // Create video track from source on sender (pc2)
                pc2.create_video_track(source);

                // --- WebRTC P2P negotiation with spawn_local async
                
                // Step 1: pc1 creates offer
                pc1.create_offer();
                // Wait for spawn_local to complete ICE gathering
                await new Promise(r => setTimeout(r, 2000));
                // Poll until ICE gathering complete for offer
                for (let i = 0; i < 20; i++) {
                    if (pc1.gathering_state() === 'Complete') break;
                    await new Promise(r => setTimeout(r, 500));
                }
                setStatus('ICE gathering complete for offer ✅', 'ok');

                // Re-read offer with ICE candidates
                const offer = pc1.local_description();
                if (!offer || !offer.sdp) {
                    setStatus('Error: offer not ready', 'err');
                    return;
                }
                
                // Step 2: pc2 sets remote description
                pc2.set_remote_description(offer);
                await new Promise(r => setTimeout(r, 1000));
                
                // Step 3: pc2 creates answer
                pc2.create_answer();
                await new Promise(r => setTimeout(r, 2000));
                // Poll until ICE gathering complete for answer
                for (let i = 0; i < 20; i++) {
                    if (pc2.gathering_state() === 'Complete') break;
                    await new Promise(r => setTimeout(r, 500));
                }

                // Step 4: read answer with ICE candidates
                const answer = pc2.local_description();
                if (!answer || !answer.sdp) {
                    setStatus('Error: answer not ready', 'err');
                    return;
                }
                
                // Step 5: pc1 sets remote description
                pc1.set_remote_description(answer);
                
                setStatus('SDP + ICE exchanged via spawn_local ✅', 'ok');
                stopBtn.disabled = false;

            } catch (e) {
                setStatus('Error: ' + e, 'error');
                console.error('Start error:', e);
                startBtn.disabled = false;
                await cleanup();
            }
        }

        // ── Stop / Cleanup ──────────────────────────────────────────────

        async function stop() {
            stopped = true;
            setStatus('Stopping...', 'warn');
            startBtn.disabled = true;
            stopBtn.disabled = true;

            if (iceTimer) {
                clearInterval(iceTimer);
                iceTimer = null;
            }

            await cleanup();

            ice1El.textContent = '\u2014';
            ice2El.textContent = '\u2014';
            sig1El.textContent = '\u2014';
            sig2El.textContent = '\u2014';

            setStatus('Stopped', 'ok');
            startBtn.disabled = false;
        }

        async function cleanup() {
            if (source) {
                try { source.stop(); } catch (_) {}
                source = null;
            }
            if (pc1) {
                try { pc1.close(); } catch (_) {}
                pc1 = null;
            }
            if (pc2) {
                try { pc2.close(); } catch (_) {}
                pc2 = null;
            }
        }

        // ── Bootstrap ───────────────────────────────────────────────────

        main().catch((e) => {
            console.error('Init error:', e);
            setStatus('Init error: ' + e, 'error');
            startBtn.disabled = true;
        });
    </script>
</body>
</html>
